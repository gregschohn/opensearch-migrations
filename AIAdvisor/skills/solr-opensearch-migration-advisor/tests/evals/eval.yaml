      value: >-
        Response recaps information provided. Response contains a descriptions of fields that should be included
        in a index schema, based on the information provided by the user.
        Besides textual fields to search in such as news snippets, article sections, book chapters and pragraphs,
        it shall also mention publishing date as date field, author(s) as keyword field. Both publishing and author(s)
        field are used in filters.
        It also mentions similarity search and utilization of a vector field. 
        Response also covers representation of parent-child document relationships as present in splitting articles or
        books into subparts such as section, chapter and / or paragraph.
        Asks the user to validate the information, provide more information or whether to proceed to next step.
