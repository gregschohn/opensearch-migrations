# Full E2E CDC test: snapshot migration + capture proxy (capturing from start) + replayer.
# Proxy starts with noCapture=false so traffic is captured throughout the entire
# migration lifecycle (before, during, and after backfill).
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cdc-full-e2e-imported-clusters
spec:
  serviceAccountName: argo-test-workflow-executor
  entrypoint: main
  parallelism: 100

  arguments:
    parameters:
      - name: s3-snapshot-configmap
        value: "migrations-default-s3-config"
      - name: migration-image-configmap
        value: "migration-image-config"
      - name: monitor-retry-limit
        value: "120"
      - name: speedup-factor
        value: "20"

  templates:
    - name: main
      inputs:
        parameters:
          - name: source-configs
          - name: target-config
          - name: imageMigrationConsoleLocation
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsoleImage
          - name: imageMigrationConsolePullPolicy
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.migration-image-configmap}}"
                key: migrationConsolePullPolicy
      steps:
        - - name: generate-base-config
            templateRef:
              name: full-migration-imported-clusters
              template: generate-migration-configs
            arguments:
              parameters:
                - name: source-configs
                  value: "{{inputs.parameters.source-configs}}"
                - name: target-config
                  value: "{{inputs.parameters.target-config}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        - - name: add-traffic-config
            template: add-traffic-config
            arguments:
              parameters:
                - name: baseConfigBase64
                  value: "{{steps.generate-base-config.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"

        - - name: run-full-migration-with-workflow-cli
            templateRef:
              name: full-migration-with-workflow-cli
              template: main
            arguments:
              parameters:
                - name: migrationConfigBase64
                  value: "{{steps.add-traffic-config.outputs.parameters.migrationConfigBase64}}"
                - name: imageMigrationConsoleLocation
                  value: "{{inputs.parameters.imageMigrationConsoleLocation}}"
                - name: imageMigrationConsolePullPolicy
                  value: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
                - name: keepMigrationWorkflow
                  value: "true"

    - name: add-traffic-config
      inputs:
        parameters:
          - name: baseConfigBase64
          - name: imageMigrationConsoleLocation
          - name: imageMigrationConsolePullPolicy
          - name: tupleS3Region
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: AWS_REGION
          - name: useLocalStack
            default: "false"
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: USE_LOCAL_STACK
                optional: true
          - name: tupleS3Endpoint
            default: ""
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: ENDPOINT_HTTP
                optional: true
          - name: tupleS3BucketName
            valueFrom:
              configMapKeyRef:
                name: "{{workflow.parameters.s3-snapshot-configmap}}"
                key: BUCKET_NAME
      container:
        image: "{{inputs.parameters.imageMigrationConsoleLocation}}"
        imagePullPolicy: "{{inputs.parameters.imageMigrationConsolePullPolicy}}"
        command: [sh, -c]
        args:
          - |
            set -e
            BASE_CONFIG=$(echo "{{inputs.parameters.baseConfigBase64}}" | base64 -d)
            TUPLE_S3_REGION='{{inputs.parameters.tupleS3Region}}'
            USE_LOCAL_STACK='{{inputs.parameters.useLocalStack}}'
            TUPLE_S3_ENDPOINT='{{inputs.parameters.tupleS3Endpoint}}'
            TUPLE_S3_BUCKET='{{inputs.parameters.tupleS3BucketName}}'

            # Overlay CDC traffic config with capture enabled from start
            CDC_CONFIG=$(echo "$BASE_CONFIG" | jq \
              --arg tupleS3Bucket "$TUPLE_S3_BUCKET" \
              --arg tupleS3Region "$TUPLE_S3_REGION" \
              --argjson useLocalStack "$USE_LOCAL_STACK" \
              --arg tupleS3Endpoint "$TUPLE_S3_ENDPOINT" \
              '. + {
              "kafkaClusterConfiguration": {
                "default": {
                  "autoCreate": {}
                }
              },
              "traffic": {
                "proxies": {
                  "capture-proxy": {
                    "source": "source1",
                    "proxyConfig": {
                      "listenPort": 9201,
                      "noCapture": false
                    }
                  }
                },
                "replayers": {
                  "replay1": {
                    "fromProxy": "capture-proxy",
                    "toTarget": "target1",
                    "dependsOnSnapshotMigrations": [
                      {"source": "source1", "snapshot": "testsnapshot"}
                    ],
                    "replayerConfig": ({
                      "observedPacketConnectionTimeout": 30,
                      "speedupFactor": {{workflow.parameters.speedup-factor}},
                      "useLocalStack": $useLocalStack
                    }
                    + (if $tupleS3Bucket != "" then {
                        "tupleS3Bucket": $tupleS3Bucket,
                        "tupleS3Region": $tupleS3Region,
                        "tupleS3Prefix": "tuples/"
                      } else {} end)
                    + (if $tupleS3Endpoint != "" then {"tupleS3Endpoint": $tupleS3Endpoint} else {} end))
                  }
                }
              }
            }')

            echo "CDC full E2E migration config:"
            echo "$CDC_CONFIG" | jq .
            echo "$CDC_CONFIG" | base64 | tr -d '\n' > /tmp/migration-config-base64
      outputs:
        parameters:
          - name: migrationConfigBase64
            valueFrom:
              path: /tmp/migration-config-base64
